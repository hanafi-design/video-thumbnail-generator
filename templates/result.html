<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Thumbnail Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow border-0">

        <div class="card-header py-3">

            <h2 class="mb-0">
                ✅ Thumbnail Gallery
            </h2>

        </div>

        <div class="card-body">

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <!-- Statistik Video -->

            <div class="row mb-4">

                <div class="col-md-3">

                    <div class="card text-center h-100">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Video
                            </h6>

                            <small>
                                {{ video }}
                            </small>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card text-center h-100">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Duration
                            </h6>

                            <h5>
                                {{ duration }} s
                            </h5>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card text-center h-100">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Interval
                            </h6>

                            <h5>
                                {{ interval }} s
                            </h5>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card text-center h-100">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Thumbnails
                            </h6>

                            <h5>
                                {{ total }}
                            </h5>

                        </div>

                    </div>

                </div>

            </div>

            <div class="card mb-4">

            <!-- Action Button -->

            <div class="mb-4">

                <a
                    href="/download-zip/{{ video_name }}"
                    class="btn btn-primary">

                    📦 Download All ZIP

                </a>

                <a
                    href="/"
                    class="btn btn-secondary">

                    Upload Video Baru

                </a>

            </div>

            <hr>

            <!-- Gallery -->

            <div class="row">

                {% for thumb in thumbnails %}

                <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

                    <div class="card shadow-sm h-100">

                        <img
                            src="/thumbnails/{{ thumb }}"
                            class="card-img-top"
                            alt="{{ thumb }}">

                        <div class="card-body text-center">

                            <small class="d-block mb-2 text-muted">
                                {{ thumb }}
                            </small>

                            <a
                                href="/thumbnails/{{ thumb }}"
                                download
                                class="btn btn-success btn-sm">

                                Download

                            </a>

                        </div>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>

    </div>

</div>

</body>
</html>
